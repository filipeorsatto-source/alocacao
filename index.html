<!-- NEW PROJECT MODAL -->
<div class="modal-overlay" id="new-proj-modal">
  <div class="modal" style="max-width:480px">
    <div class="modal-head">
      <h2>Novo Projeto</h2>
      <button class="btn-ghost" onclick="closeNewProjModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label class="field-label">Nome do projeto</label>
        <select id="np-name-sel"></select>
      </div>
      <div class="modal-field">
        <label class="field-label">Formato de criação</label>
        <select id="np-format" onchange="onFormatChange()">
          <option value="zero">Criar do zero</option>
          <option value="template">Utilizar template padrão</option>
        </select>
      </div>
      <div class="modal-field" id="np-date-field" style="display:none">
        <label class="field-label">Data de início</label>
        <input type="date" id="np-date" value="2026-04-01" />
        <p class="settings-hint">Todas as tarefas do template serão calculadas a partir desta data.</p>
      </div>
      <div class="modal-actions">
        <button class="btn-outline" onclick="closeNewProjModal()">Cancelar</button>
        <button class="btn-primary" onclick="createProject()">Criar projeto</button>
      </div>
    </div>
  </div>
</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modal-title">Nova Tarefa</h2>
      <button class="btn-ghost" onclick="closeModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="f-id"/>
      <div class="modal-field"><label class="field-label">Nome da tarefa</label><input type="text" id="f-name" placeholder="Ex: Reunião de alinhamento..."/></div>
      <div class="modal-field" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><label class="field-label">Macroetapa</label><select id="f-macro" onchange="updateSubetapas()"></select></div>
        <div><label class="field-label">Subetapa <span style="color:#ef4444">*</span></label><select id="f-sub" required></select></div>
      </div>
      <div class="modal-field" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
        <div><label class="field-label">Início</label><input type="date" id="f-start"/></div>
        <div><label class="field-label">Fim</label><input type="date" id="f-end"/></div>
        <div><label class="field-label">Conclusão</label><input type="date" id="f-completed" title="Preenchido automaticamente quando o status for Finalizado"/></div>
      </div>
      <div class="modal-field" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
        <div><label class="field-label">Status</label><select id="f-status" onchange="onStatusChange()"><option>Não Iniciado</option><option>Em Execução</option><option>Finalizado</option></select></div>
        <div><label class="field-label">Responsável</label><select id="f-resp"><option value="">— Sem responsável —</option></select></div>
        <div><label class="field-label">Esforço (1–5)</label><input type="number" id="f-effort" min="1" max="5" value="3"/></div>
      </div>
      <div class="modal-field"><label class="field-label">Descrição</label><textarea id="f-desc" rows="2" placeholder="Detalhes..."></textarea></div>
      <div class="modal-field">
        <label class="field-label">Checklist</label>
        <div id="checklist-items"></div>
        <div style="display:flex;gap:8px;margin-top:6px">
          <input type="text" id="new-check-input" placeholder="Novo item..." onkeydown="if(event.key==='Enter')addCheckItem()"/>
          <button class="btn-outline" onclick="addCheckItem()" style="white-space:nowrap">+ Add</button>
        </div>
      </div>
      <div class="modal-field"><label class="field-label">Observações</label><textarea id="f-notes" rows="2" placeholder="Comentários..."></textarea></div>
      <div class="modal-actions">
        <button class="btn-outline" onclick="closeModal()">Cancelar</button>
        <button class="btn-primary" onclick="saveTask()">Salvar tarefa</button>
      </div>
    </div>
  </div>
</div>

<!-- MACRO MODAL -->
<div class="modal-overlay" id="macro-modal">
  <div class="modal" style="max-width:520px">
    <div class="modal-head">
      <h2 id="macro-modal-title">Nova Macroetapa</h2>
      <button class="btn-ghost" onclick="closeMacroModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="m-id"/>
      <div class="modal-field"><label class="field-label">Nome</label><input type="text" id="m-name" placeholder="Ex: Setup Inicial..."/></div>
      <div class="modal-field">
        <label class="field-label">Tipo</label>
        <div style="display:flex;gap:10px;margin-top:4px">
          <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13px;color:#374151;padding:8px 14px;border:1px solid #e5e7eb;border-radius:8px;flex:1" id="m-tipo-imp-label">
            <input type="radio" name="m-tipo" id="m-tipo-imp" value="Implantação" checked style="width:auto;accent-color:#6366f1"/>
            <span>📋 Implantação</span>
          </label>
          <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13px;color:#374151;padding:8px 14px;border:1px solid #e5e7eb;border-radius:8px;flex:1" id="m-tipo-sus-label">
            <input type="radio" name="m-tipo" id="m-tipo-sus" value="Sustentação" style="width:auto;accent-color:#6366f1"/>
            <span>🔧 Sustentação</span>
          </label>
        </div>
      </div>
      <div class="modal-field">
        <label class="field-label">Cor</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
          <button onclick="selectMacroColor('#6366f1')" id="mc-6366f1" style="width:28px;height:28px;border-radius:50%;background:#6366f1;border:3px solid #111;cursor:pointer"></button>
          <button onclick="selectMacroColor('#0ea5e9')" id="mc-0ea5e9" style="width:28px;height:28px;border-radius:50%;background:#0ea5e9;border:3px solid transparent;cursor:pointer"></button>
          <button onclick="selectMacroColor('#f59e0b')" id="mc-f59e0b" style="width:28px;height:28px;border-radius:50%;background:#f59e0b;border:3px solid transparent;cursor:pointer"></button>
          <button onclick="selectMacroColor('#10b981')" id="mc-10b981" style="width:28px;height:28px;border-radius:50%;background:#10b981;border:3px solid transparent;cursor:pointer"></button>
          <button onclick="selectMacroColor('#ec4899')" id="mc-ec4899" style="width:28px;height:28px;border-radius:50%;background:#ec4899;border:3px solid transparent;cursor:pointer"></button>
          <button onclick="selectMacroColor('#ef4444')" id="mc-ef4444" style="width:28px;height:28px;border-radius:50%;background:#ef4444;border:3px solid transparent;cursor:pointer"></button>
          <button onclick="selectMacroColor('#8b5cf6')" id="mc-8b5cf6" style="width:28px;height:28px;border-radius:50%;background:#8b5cf6;border:3px solid transparent;cursor:pointer"></button>
          <button onclick="selectMacroColor('#14b8a6')" id="mc-14b8a6" style="width:28px;height:28px;border-radius:50%;background:#14b8a6;border:3px solid transparent;cursor:pointer"></button>
          <button onclick="selectMacroColor('#f97316')" id="mc-f97316" style="width:28px;height:28px;border-radius:50%;background:#f97316;border:3px solid transparent;cursor:pointer"></button>
          <button onclick="selectMacroColor('#64748b')" id="mc-64748b" style="width:28px;height:28px;border-radius:50%;background:#64748b;border:3px solid transparent;cursor:pointer"></button>
        </div>
        <input type="hidden" id="m-color" value="#6366f1"/>
      </div>
      <div class="modal-field">
        <label class="field-label">Subetapas</label>
        <div id="m-subetapas-list" style="margin-bottom:8px"></div>
        <div style="display:flex;gap:8px">
          <input type="text" id="new-sub-input" placeholder="Nome da subetapa..." onkeydown="if(event.key==='Enter')addSubetapa()"/>
          <button class="btn-outline" onclick="addSubetapa()" style="white-space:nowrap">+ Add</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-outline" onclick="closeMacroModal()">Cancelar</button>
        <button class="btn-primary" onclick="saveMacro()">Salvar</button>
      </div>
    </div>
  </div>
</div>

<script src="app.js" defer></script>

</body>
</html>
