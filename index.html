// Linear settings
window.saveLinearSettings = async function(){
  const p=getProject(); if(!p)return;
  const key=document.getElementById("lin-key").value.trim();
  const pid=document.getElementById("lin-pid").value.trim();
  await fbUpdate({
    ["implantProjects/"+p.id+"/linearApiKey"]:key,
    ["implantProjects/"+p.id+"/linearProjectId"]:pid,
  });
  p.linearApiKey=key; p.linearProjectId=pid;
  fetchLinear();
};

// Linear fetch + store issues
const _origFetchLinear = typeof fetchLinear === "function" ? fetchLinear : null;
window.fetchLinear = async function(){
  const p=getProject(); if(!p||!p.linearApiKey)return;
  const statusEl=document.getElementById("lin-status");
  if(statusEl)statusEl.innerHTML="<div style='padding:10px;background:#eff6ff;border-radius:8px;color:#1d4ed8;font-size:12px;margin-bottom:10px'>Carregando issues...</div>";
  try{
    const q="{issues(filter:{"+(p.linearProjectId?"project:{id:{eq:""+p.linearProjectId+""}}":'')+"})  {nodes{id title state{name} assignee{name} priority createdAt url project{name} team{name}}}}";
    const res=await fetch("https://api.linear.app/graphql",{method:"POST",headers:{"Authorization":p.linearApiKey,"Content-Type":"application/json"},body:JSON.stringify({query:q})});
    const data=await res.json();
    if(data.errors)throw new Error(data.errors[0].message);
    const issues=data.data?.issues?.nodes||[];
    const issObj={}; issues.forEach((iss,i)=>{ issObj["i"+i]=iss; });
    await fbSet("implantProjects/"+p.id+"/linearIssues", issObj);
    if(statusEl)statusEl.innerHTML="";
  }catch(e){
    if(statusEl)statusEl.innerHTML="<div style='padding:10px;background:#fef2f2;border-radius:8px;color:#b91c1c;font-size:12px;margin-bottom:10px'>Erro: "+e.message+"</div>";
  }
};

// Subetapa rename / delete
window.openRenameSubModal = async function(macroId,oldName){
  const p=getProject(); if(!p)return;
  const newName=prompt("Renomear subetapa:",oldName);
  if(!newName||!newName.trim()||newName.trim()===oldName)return;
  const m=p.macros.find(x=>x.id===macroId); if(!m)return;
  const idx=m.subetapas.indexOf(oldName);
  if(idx>=0){
    const subs=[...m.subetapas]; subs[idx]=newName.trim();
    await fbSet("implantProjects/"+p.id+"/macros/"+macroId+"/subetapas",subs);
    const updates={};
    p.tasks.filter(t=>t.macroId===macroId&&t.subetapa===oldName).forEach(t=>{
      updates["implantProjects/"+p.id+"/tasks/"+t.id+"/subetapa"]=newName.trim();
    });
    if(Object.keys(updates).length) await fbUpdate(updates);
  }
};

window.deleteSubetapa = async function(macroId,subName){
  const p=getProject(); if(!p)return;
  const cnt=p.tasks.filter(t=>t.macroId===macroId&&t.subetapa===subName).length;
  if(!confirm("Excluir subetapa ""+subName+""?"+(cnt>0?" "+cnt+" tarefa(s) perderão a subetapa.":"")))return;
  const m=p.macros.find(x=>x.id===macroId); if(!m)return;
  const subs=m.subetapas.filter(s=>s!==subName);
  await fbSet("implantProjects/"+p.id+"/macros/"+macroId+"/subetapas",subs);
  const updates={};
  p.tasks.filter(t=>t.macroId===macroId&&t.subetapa===subName).forEach(t=>{
    updates["implantProjects/"+p.id+"/tasks/"+t.id+"/subetapa"]="";
  });
  if(Object.keys(updates).length) await fbUpdate(updates);
};

window.deleteAlloc = async function(type,id){
  let msg="Excluir este item?";
  if(type==="employee"){const e=allocEmployees.find(x=>x.id===id);msg="Excluir funcionário ""+e?.nome+""? As vagas vinculadas ficarão em aberto.";}
  else if(type==="project"){const p=allocProjects.find(x=>x.id===id);msg="Excluir projeto ""+p?.nome+""? As vagas vinculadas também serão removidas.";}
  if(!confirm(msg))return;
  if(type==="employee"){
    await fbRemove("employees/"+id);
    const updates={};
    allocVacancies.filter(v=>v.funcionarioId===id).forEach(v=>{ updates["vacancies/"+v.id+"/funcionarioId"]=""; });
    if(Object.keys(updates).length) await fbUpdate(updates);
  } else if(type==="project"){
    await fbRemove("allocProjects/"+id);
    for(const v of allocVacancies.filter(v=>v.projetoId===id)) await fbRemove("vacancies/"+v.id);
  } else if(type==="vacancy"){
    await fbRemove("vacancies/"+id);
  }
};

// ── Auth gate + bootstrap ──────────────────────────────────────────────────
onAuthStateChanged(auth, async user=>{
  const loginEl = document.getElementById("login-screen");
  const appEl   = document.getElementById("app");
  if(user){
    // Update sidebar user info
    const nameEl  = document.getElementById("sb-user-name");
    const emailEl = document.getElementById("sb-user-email");
    const photoEl = document.getElementById("sb-user-photo");
    if(nameEl)  nameEl.textContent  = user.displayName||"";
    if(emailEl) emailEl.textContent = user.email||"";
    if(photoEl&&user.photoURL){ photoEl.src=user.photoURL; photoEl.style.display="block"; }
    // Hide login, show app
    loginEl.style.display="none"; appEl.style.display="flex";
    // Seed data if needed, then start listeners
    await seedIfEmpty();
    startListeners();
  } else {
    // Show login, hide app
    appEl.style.display="none";
    loginEl.style.display="flex";
    // Reset state
    projects=[]; allocEmployees=[]; allocProjects=[]; allocVacancies=[];
  }
});
